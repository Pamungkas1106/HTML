<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tugas Gabungan</title>
</head>
<body>

    <header>
        <h1>Tugas Gabungan</h1>
       <p>Silahkan isi form di bawah ini untuk menghubungi kami</p>
    </header>

    <hr>

    <main>
        <section>
            <h2>Form Registrasi</h2>

            <form>
                <fieldset>
                    <legend>Data Diri</legend>
                    <br>

                    <label for="nama">Nama:</label><br>
                    <input type="text" id="nama" required><br>
                    <br>

                    <label for="email">Email:</label><br>
                    <input type="email" id="email" required><br>
                    <br>

                    <label for="pesan">Pesan:</label><br>
                    <textarea id="pesan" name="pesan" rows="4" cols="50" required></textarea><br>
                    <br>

                    <button type="submit">Kirim</button>

                </fieldset>
            </form>
        </section>

        <hr>

        <section>
            <h2>Video Perkenalan</h2>

            <video width="500" controls>
                <source src="video.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>

        </section>
    </main>

    <br>
    
    <footer>
        <p>&copy; 2026 Ridho. All rights reserved.</p>
    
</body>
</html>
