<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Halaman Registrasi">
    <title>Register</title>
    <link rel="icon" href="images/favicon.png">
</head>
<body>

<header>
    <h1>Form Registrasi</h1>
</header>

<main>

    <form>

        <fieldset>

            <legend>Data Diri</legend>

            <br>

            <label for="nama">Nama</label><br>
            <input type="text" id="nama"><br><br>

            <label for="email">Email</label><br>
            <input type="email" id="email"><br><br>

            <label for="password">Password</label><br>
            <input type="password" id="password"><br><br>

            <p>Jenis Kelamin</p>

            <input type="radio" id="laki" name="gender">
            <label for="laki">Laki-laki</label>

            <input type="radio" id="perempuan" name="gender">
            <label for="perempuan">Perempuan</label>

            <br><br>

            <p>Hobi</p>

            <input type="checkbox" id="coding">
            <label for="coding">Coding</label>

            <input type="checkbox" id="gaming">
            <label for="gaming">Gaming</label>

            <input type="checkbox" id="musik">
            <label for="musik">Musik</label>

            <input type="checkbox" id="olahraga">
            <label for="olahraga">Olahraga</label>

            <input type="checkbox" id="membaca">
            <label for="membaca">Membaca</label>    

            <input type="checkbox" id="lainnya">
            <label for="lainnya">Lainnya</label>

            <br><br>

            <label for="kota">Kota</label><br>

            <br>

            <select id="kota">
                <option>Binjai</option>
                <option>Medan</option>
                <option>Jakarta</option>
                <option>Bandung</option>
                <option>Surabaya</option>
                <optgroup label="Lainnya">
                    <option>Yogyakarta</option>
                    <option>Semarang</option>
                    <option>Makassar</option>
            </select>

            <br><br>

            <button type="submit">
                Daftar
            </button>

        </fieldset>

    </form>

</main>

<footer>
    <a href="login.html">Sudah punya akun? Login</a>

    <br><br>

    <p>&copy; 2024 Maha Ridho Pamungkas. All rights reserved.</p>
</footer>

</body>
</html>
